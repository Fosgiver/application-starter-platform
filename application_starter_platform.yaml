openapi: 3.1.0
info:
  title: Application Starter Platform
  version: 0.1.0
paths:
  /health:
    get:
      summary: Check application health
      operationId: getHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /register:
    post:
      tags:
      - Authentication
      summary: Create a new user account
      operationId: registerUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /email-verification/confirm:
    post:
      tags:
      - Authentication
      summary: Confirm user email verification
      operationId: confirmEmailVerification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /password/forgot:
    post:
      tags:
      - Authentication
      summary: Request password reset instructions
      operationId: requestPasswordReset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /password/reset:
    post:
      tags:
      - Authentication
      summary: Complete a password reset
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /login:
    post:
      tags:
      - Authentication
      summary: Authenticate a user account
      operationId: loginUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/me:
    get:
      tags:
      - Authentication
      summary: Return the authenticated user account
      operationId: getCurrentAccount
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentAccountResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleResponse'
      security:
      - bearerAuth: []
components:
  schemas:
    AccountSummary:
      properties:
        account_id:
          type: string
          format: uuid
          title: Account Id
        email:
          type: string
          format: email
          title: Email
        email_verified:
          type: boolean
          title: Email Verified
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - account_id
      - email
      - email_verified
      - created_at
      title: AccountSummary
    CurrentAccountResponse:
      properties:
        success:
          type: boolean
          title: Success
        account:
          $ref: '#/components/schemas/AccountSummary'
      type: object
      required:
      - success
      - account
      title: CurrentAccountResponse
    EmailVerificationRequest:
      properties:
        token:
          type: string
          minLength: 1
          title: Token
      additionalProperties: false
      type: object
      required:
      - token
      title: EmailVerificationRequest
    ForgotPasswordRequest:
      properties:
        email:
          type: string
          maxLength: 254
          format: email
          title: Email
      additionalProperties: false
      type: object
      required:
      - email
      title: ForgotPasswordRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
        application:
          type: string
          title: Application
        version:
          type: string
          title: Version
      type: object
      required:
      - status
      - application
      - version
      title: HealthResponse
    LoginRequest:
      properties:
        email:
          type: string
          maxLength: 254
          format: email
          title: Email
        password:
          type: string
          maxLength: 128
          minLength: 8
          title: Password
      additionalProperties: false
      type: object
      required:
      - email
      - password
      title: LoginRequest
    LoginResponse:
      properties:
        success:
          type: boolean
          title: Success
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          const: bearer
          title: Token Type
          default: bearer
        expires_in:
          type: integer
          exclusiveMinimum: 0.0
          title: Expires In
      type: object
      required:
      - success
      - access_token
      - expires_in
      title: LoginResponse
    RegistrationRequest:
      properties:
        email:
          type: string
          maxLength: 254
          format: email
          title: Email
        password:
          type: string
          maxLength: 128
          minLength: 8
          title: Password
      additionalProperties: false
      type: object
      required:
      - email
      - password
      title: RegistrationRequest
    ResetPasswordRequest:
      properties:
        token:
          type: string
          minLength: 1
          title: Token
        new_password:
          type: string
          maxLength: 128
          minLength: 8
          title: New Password
      additionalProperties: false
      type: object
      required:
      - token
      - new_password
      title: ResetPasswordRequest
    SimpleResponse:
      properties:
        success:
          type: boolean
          title: Success
        message:
          type: string
          title: Message
      type: object
      required:
      - success
      - message
      title: SimpleResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    bearerAuth:
      type: http
      description: Short-lived JWT access token returned by login.
      scheme: bearer
      bearerFormat: JWT
