schema_version: 2

application:
  name: Application Starter Developer
  slug: application-starter-developer
  version: 0.2.0
  publisher: Konstantinos Andritsopoulos
  description: Reusable foundation for building a new application.

runtime:
  host: 127.0.0.1
  port: 8000
  open_browser_on_start: true
  post_login_path: /account.html

data:
  directory_name: ApplicationStarterDeveloper

database:
  provider: sqlite

email:
  mode: console
  from_name: Application Starter Developer

features:
  self_registration: true
  email_verification: true
  password_reset: true

development:
  domain_package: app.domain

packaging:
  executable_name: ApplicationStarterDeveloper
  installer_name: ApplicationStarterDeveloper_Setup