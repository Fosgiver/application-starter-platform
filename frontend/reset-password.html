<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <meta name="referrer" content="no-referrer">
  <title>Reset password</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: #243247;
      background: #f3f6fa;
    }

    .card {
      width: min(100%, 520px);
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(36, 50, 71, 0.12);
    }

    .symbol {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 32px;
      background: #e8f0fe;
      color: #2457a7;
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 28px;
    }

    .description {
      margin: 0 0 28px;
      text-align: center;
      line-height: 1.6;
      color: #526176;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font: inherit;
      color: #243247;
      background: white;
      border: 1px solid #c8d1dc;
      border-radius: 8px;
    }

    input:focus {
      outline: 3px solid rgba(36, 87, 167, 0.16);
      border-color: #2457a7;
    }

    .hint {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.5;
      color: #68778b;
    }

    button,
    .login-link {
      width: 100%;
      display: inline-block;
      padding: 13px 18px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      background: #2457a7;
      color: white;
    }

    button:hover,
    .login-link:hover {
      background: #1b467f;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    #status {
      margin: 20px 0 0;
      text-align: center;
      line-height: 1.6;
      color: #526176;
    }

    .error .symbol {
      background: #fdecec;
      color: #b42318;
    }

    .error #status {
      color: #8f1d18;
    }

    .success .symbol {
      background: #e7f7ee;
      color: #18864b;
    }

    .success #status {
      color: #176b42;
    }

    .login-link {
      margin-top: 24px;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>

<body>
  <main class="card" id="card">
    <div class="symbol" id="symbol">🔑</div>

    <h1>Reset password</h1>

    <p class="description" id="description">
      Choose a new password for your account.
    </p>

    <form id="reset-form">
      <div class="field">
        <label for="new-password">
          New password
        </label>

        <input
          id="new-password"
          name="new-password"
          type="password"
          minlength="8"
          maxlength="128"
          autocomplete="new-password"
          required
        >

        <p class="hint">
          Use between 8 and 128 characters.
        </p>
      </div>

      <div class="field">
        <label for="confirm-password">
          Confirm new password
        </label>

        <input
          id="confirm-password"
          name="confirm-password"
          type="password"
          minlength="8"
          maxlength="128"
          autocomplete="new-password"
          required
        >
      </div>

      <button type="submit" id="submit-button">
        Reset password
      </button>
    </form>

    <p
      id="status"
      role="status"
      aria-live="polite"
      hidden
    ></p>

    <a
      class="login-link"
      id="login-link"
      href="/login.html"
      hidden
    >
      Continue to login
    </a>
  </main>

  <script>
    const cardElement = document.getElementById("card");
    const symbolElement = document.getElementById("symbol");
    const descriptionElement = document.getElementById(
      "description"
    );
    const formElement = document.getElementById("reset-form");
    const newPasswordElement = document.getElementById(
      "new-password"
    );
    const confirmPasswordElement = document.getElementById(
      "confirm-password"
    );
    const submitButtonElement = document.getElementById(
      "submit-button"
    );
    const statusElement = document.getElementById("status");
    const loginLinkElement = document.getElementById(
      "login-link"
    );

    const queryParameters = new URLSearchParams(
      window.location.search
    );

    const token = queryParameters.get("token");

    function showError(message, hideForm = false) {
      cardElement.classList.remove("success");
      cardElement.classList.add("error");

      symbolElement.textContent = "!";
      statusElement.textContent = message;
      statusElement.hidden = false;

      if (hideForm) {
        formElement.hidden = true;
        descriptionElement.hidden = true;
      }
    }

    function showSuccess(message) {
      cardElement.classList.remove("error");
      cardElement.classList.add("success");

      symbolElement.textContent = "✓";
      descriptionElement.hidden = true;
      formElement.hidden = true;

      statusElement.textContent = message;
      statusElement.hidden = false;

      loginLinkElement.hidden = false;
    }

    if (!token) {
      showError(
        "The password reset token is missing.",
        true
      );
    }

    formElement.addEventListener(
      "submit",
      async (event) => {
        event.preventDefault();

        if (!token) {
          return;
        }

        const newPassword = newPasswordElement.value;
        const confirmPassword = confirmPasswordElement.value;

        if (newPassword !== confirmPassword) {
          showError("The passwords do not match.");
          confirmPasswordElement.focus();
          return;
        }

        if (
          newPassword.length < 8
          || newPassword.length > 128
        ) {
          showError(
            "The password must contain between 8 and 128 characters."
          );
          newPasswordElement.focus();
          return;
        }

        cardElement.classList.remove("error");
        statusElement.hidden = true;

        submitButtonElement.disabled = true;
        submitButtonElement.textContent = "Resetting password…";

        try {
          const response = await fetch(
            "/password/reset",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                token,
                new_password: newPassword
              })
            }
          );

          let responseData = {};

          try {
            responseData = await response.json();
          } catch {
            responseData = {};
          }

          if (!response.ok) {
            if (response.status === 422) {
              showError(
                "The new password does not meet the password requirements."
              );
            } else {
              showError(
                responseData.message
                  || "The password reset link is invalid or expired."
              );
            }

            return;
          }

          formElement.reset();

          window.history.replaceState(
            {},
            document.title,
            window.location.pathname
          );

          showSuccess(
            "Your password was reset successfully. "
            + "You can now sign in with your new password."
          );

        } catch {
          showError(
            "The password reset service is temporarily unavailable."
          );

        } finally {
          submitButtonElement.disabled = false;
          submitButtonElement.textContent = "Reset password";
        }
      }
    );
  </script>
</body>
</html>
