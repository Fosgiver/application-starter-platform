<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <meta name="referrer" content="no-referrer">
  <title>Login</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: #243247;
      background: #f3f6fa;
    }

    .card {
      width: min(100%, 520px);
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(36, 50, 71, 0.12);
    }

    .symbol {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 32px;
      background: #e8f0fe;
      color: #2457a7;
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 28px;
    }

    .description {
      margin: 0 0 28px;
      text-align: center;
      line-height: 1.6;
      color: #526176;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font: inherit;
      color: #243247;
      background: white;
      border: 1px solid #c8d1dc;
      border-radius: 8px;
    }

    input:focus {
      outline: 3px solid rgba(36, 87, 167, 0.16);
      border-color: #2457a7;
    }

    button {
      width: 100%;
      padding: 13px 18px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: #2457a7;
      color: white;
    }

    button:hover {
      background: #1b467f;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .forgot-link {
      display: block;
      margin-top: 20px;
      text-align: center;
      color: #2457a7;
    }

    #status {
      margin: 20px 0 0;
      text-align: center;
      line-height: 1.6;
      color: #526176;
    }

    .error .symbol {
      background: #fdecec;
      color: #b42318;
    }

    .error #status {
      color: #8f1d18;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>

<body>
  <main class="card" id="card">
    <div class="symbol" id="symbol">🔐</div>

    <h1>Login</h1>

    <p class="description">
      Sign in with your email address and password.
    </p>

    <form id="login-form">
      <div class="field">
        <label for="email">
          Email address
        </label>

        <input
          id="email"
          name="email"
          type="email"
          maxlength="254"
          autocomplete="email"
          required
        >
      </div>

      <div class="field">
        <label for="password">
          Password
        </label>

        <input
          id="password"
          name="password"
          type="password"
          minlength="8"
          maxlength="128"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" id="submit-button">
        Login
      </button>
    </form>

    <a
      class="forgot-link"
      href="/forgot-password.html"
    >
      Forgot your password?
    </a>

    <p
      id="status"
      role="status"
      aria-live="polite"
      hidden
    ></p>
  </main>

  <script>
    const cardElement = document.getElementById("card");
    const symbolElement = document.getElementById("symbol");
    const formElement = document.getElementById("login-form");
    const emailElement = document.getElementById("email");
    const passwordElement = document.getElementById("password");
    const submitButtonElement = document.getElementById(
      "submit-button"
    );
    const statusElement = document.getElementById("status");

    function showError(message) {
      cardElement.classList.add("error");

      symbolElement.textContent = "!";
      statusElement.textContent = message;
      statusElement.hidden = false;
    }

    formElement.addEventListener(
      "submit",
      async (event) => {
        event.preventDefault();

        cardElement.classList.remove("error");
        symbolElement.textContent = "🔐";
        statusElement.hidden = true;

        submitButtonElement.disabled = true;
        submitButtonElement.textContent = "Signing in…";

        try {
          const response = await fetch(
            "/login",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                email: emailElement.value,
                password: passwordElement.value
              })
            }
          );

          let responseData = {};

          try {
            responseData = await response.json();
          } catch {
            responseData = {};
          }

          if (!response.ok) {
            showError(
              responseData.message
                || "Login could not be completed."
            );
            return;
          }

          if (
            typeof responseData.access_token !== "string"
            || !responseData.access_token
          ) {
            showError(
              "The login response did not contain an access token."
            );
            return;
          }

          try {
            sessionStorage.setItem(
              "access_token",
              responseData.access_token
            );

            sessionStorage.setItem(
              "token_type",
              responseData.token_type
            );

            sessionStorage.setItem(
              "access_token_expires_at",
              String(
                Date.now()
                + responseData.expires_in * 1000
              )
            );
          } catch {
            showError(
              "Login succeeded, but the browser could not store the session."
            );
            return;
          }

          formElement.reset();

          window.location.replace("/account.html");

        } catch {
          showError(
            "The login service is temporarily unavailable."
          );

        } finally {
          submitButtonElement.disabled = false;
          submitButtonElement.textContent = "Login";
        }
      }
    );
  </script>
</body>
</html>
