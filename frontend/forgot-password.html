<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <meta name="referrer" content="no-referrer">
  <title>Forgot password</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: #243247;
      background: #f3f6fa;
    }

    .card {
      width: min(100%, 520px);
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(36, 50, 71, 0.12);
    }

    .symbol {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 32px;
      background: #e8f0fe;
      color: #2457a7;
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 28px;
    }

    .description {
      margin: 0 0 28px;
      text-align: center;
      line-height: 1.6;
      color: #526176;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font: inherit;
      color: #243247;
      background: white;
      border: 1px solid #c8d1dc;
      border-radius: 8px;
    }

    input:focus {
      outline: 3px solid rgba(36, 87, 167, 0.16);
      border-color: #2457a7;
    }

    button,
    .login-link {
      width: 100%;
      display: inline-block;
      padding: 13px 18px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      background: #2457a7;
      color: white;
    }

    button:hover,
    .login-link:hover {
      background: #1b467f;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    #status {
      margin: 20px 0 0;
      text-align: center;
      line-height: 1.6;
      color: #526176;
    }

    .error .symbol {
      background: #fdecec;
      color: #b42318;
    }

    .error #status {
      color: #8f1d18;
    }

    .success .symbol {
      background: #e7f7ee;
      color: #18864b;
    }

    .success #status {
      color: #176b42;
    }

    .login-link {
      margin-top: 24px;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>

<body>
  <main class="card" id="card">
    <div class="symbol" id="symbol">✉</div>

    <h1>Forgot password</h1>

    <p class="description" id="description">
      Enter your email address to request password reset
      instructions.
    </p>

    <form id="forgot-password-form">
      <div class="field">
        <label for="email">
          Email address
        </label>

        <input
          id="email"
          name="email"
          type="email"
          maxlength="254"
          autocomplete="email"
          required
        >
      </div>

      <button type="submit" id="submit-button">
        Send reset instructions
      </button>
    </form>

    <p
      id="status"
      role="status"
      aria-live="polite"
      hidden
    ></p>

    <a
      class="login-link"
      id="login-link"
      href="/login.html"
      hidden
    >
      Return to login
    </a>
  </main>

  <script>
    const cardElement = document.getElementById("card");
    const symbolElement = document.getElementById("symbol");
    const descriptionElement = document.getElementById(
      "description"
    );
    const formElement = document.getElementById(
      "forgot-password-form"
    );
    const emailElement = document.getElementById("email");
    const submitButtonElement = document.getElementById(
      "submit-button"
    );
    const statusElement = document.getElementById("status");
    const loginLinkElement = document.getElementById(
      "login-link"
    );

    function showError(message) {
      cardElement.classList.remove("success");
      cardElement.classList.add("error");

      symbolElement.textContent = "!";
      statusElement.textContent = message;
      statusElement.hidden = false;
    }

    function showSuccess(message) {
      cardElement.classList.remove("error");
      cardElement.classList.add("success");

      symbolElement.textContent = "✓";
      descriptionElement.hidden = true;
      formElement.hidden = true;

      statusElement.textContent = message;
      statusElement.hidden = false;

      loginLinkElement.hidden = false;
    }

    formElement.addEventListener(
      "submit",
      async (event) => {
        event.preventDefault();

        cardElement.classList.remove("error");
        statusElement.hidden = true;

        submitButtonElement.disabled = true;
        submitButtonElement.textContent = "Sending…";

        try {
          const response = await fetch(
            "/password/forgot",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                email: emailElement.value
              })
            }
          );

          let responseData = {};

          try {
            responseData = await response.json();
          } catch {
            responseData = {};
          }

          if (!response.ok) {
            showError(
              responseData.message
                || "The request could not be completed."
            );
            return;
          }

          formElement.reset();

          showSuccess(
            responseData.message
              || (
                "If the account can continue, "
                + "the appropriate instructions will be sent."
              )
          );

        } catch {
          showError(
            "The password reset service is temporarily unavailable."
          );

        } finally {
          submitButtonElement.disabled = false;
          submitButtonElement.textContent = (
            "Send reset instructions"
          );
        }
      }
    );
  </script>
</body>
</html>
